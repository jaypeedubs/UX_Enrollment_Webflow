<!doctype html><html><head><meta charset="utf-8"><title>Radii & Shadows</title>
<link rel="stylesheet" href="preview-card.css">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head><body>
<div class="card">
  <div class="label-mini">Shape · Radii (4 fixed sizes)</div>
  <div style="display:flex;gap:18px;align-items:flex-end;margin-bottom:24px">
    <div style="text-align:center"><div style="width:90px;height:64px;background:#ebe3de;border:1px solid #c9b4a7;border-radius:3px"></div><div style="font:600 11px var(--font-body);color:#826d5f;margin-top:8px">3px · inputs</div></div>
    <div style="text-align:center"><div style="width:90px;height:64px;background:#ebe3de;border:1px solid #c9b4a7;border-radius:8px"></div><div style="font:600 11px var(--font-body);color:#826d5f;margin-top:8px">8px · md</div></div>
    <div style="text-align:center"><div style="width:90px;height:64px;background:#ebe3de;border:1px solid #c9b4a7;border-radius:20px"></div><div style="font:600 11px var(--font-body);color:#826d5f;margin-top:8px">20px · cards</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:#ebe3de;border:1px solid #c9b4a7;border-radius:999px;margin:0 auto"></div><div style="font:600 11px var(--font-body);color:#826d5f;margin-top:8px">999px · pill / circle</div></div>
  </div>
  <div class="label-mini">Elevation · Two Shadows</div>
  <div style="display:flex;gap:24px;background:#faf7f5;padding:24px;border-radius:8px">
    <div style="flex:1;background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 2px rgba(56,46,39,0.06);font-family:var(--font-body);font-size:13px;color:#382e27">Resting · shadow-sm</div>
    <div style="flex:1;background:#fff;border-radius:12px;padding:18px;box-shadow:0 8px 24px rgba(11,12,35,0.08),0 1px 2px rgba(11,12,35,0.04);font-family:var(--font-body);font-size:13px;color:#382e27">Elevated · shadow-md</div>
  </div>
</div>
</body></html>
